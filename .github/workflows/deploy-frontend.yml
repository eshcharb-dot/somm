name: Deploy Frontend

# Auto-deploys src/ to the gh-pages branch on every push to main that touches it, mirroring
# deploy-backend.yml's approach. Previously this required a manual `git subtree push --prefix
# src origin gh-pages` — easy to forget, and the exact drift that let production run stale/
# unhardened code for weeks after round 1's fix was written (see deploy-backend.yml). Gated
# behind the frontend test suite so a broken build can't reach gh-pages.
on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - ".github/workflows/deploy-frontend.yml"
  workflow_dispatch: {}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - run: node --test src/js/__tests__/*.test.js

  deploy:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Stamp service worker cache with build SHA
        # src/sw.js hardcoding a static CACHE_NAME meant the SW script's bytes never changed
        # across deploys, so browsers never re-ran install/activate and already-installed
        # users' cached app.js/ai.js/app.css never refreshed — shipped fixes silently never
        # reached them. Replacing the placeholder with the commit SHA guarantees the file
        # changes on every deploy. Fails loudly (grep -q) if the placeholder is ever removed
        # from sw.js, instead of silently deploying an unversioned cache again.
        run: |
          grep -q '__BUILD_ID__' src/sw.js || { echo "::error::src/sw.js is missing the __BUILD_ID__ placeholder — cache versioning would silently stop working"; exit 1; }
          sed -i "s/__BUILD_ID__/${GITHUB_SHA}/" src/sw.js
      - name: Deploy src/ to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./src
          publish_branch: gh-pages
